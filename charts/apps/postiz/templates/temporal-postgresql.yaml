{{- if .Values.temporal.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  {{- include "common.metadata" (dict "name" (include "postiz.temporal.postgresql.fullname" .) "root" $) | nindent 2 }}
spec:
  serviceName: {{ include "postiz.temporal.postgresql.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "common.selectorLabels" (dict "root" $ "component" "temporal-postgresql") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "common.selectorLabels" (dict "root" $ "component" "temporal-postgresql") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # local-path-provisioner ignores fsGroup; chown the mount root so the
      # postgres user (uid 70 in postgres:N-alpine) can create $PGDATA.
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ['sh', '-c', 'chown -R 70:70 /var/lib/postgresql/data']
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          {{- include "common.image" (dict "repository" (printf "%s/%s" .Values.temporal.postgresql.image.registry .Values.temporal.postgresql.image.repository) "tag" .Values.temporal.postgresql.image.tag "pullPolicy" .Values.temporal.postgresql.image.pullPolicy "root" $) | nindent 10 }}
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          env:
            {{- include "common.envSecret" (dict "name" "POSTGRES_USER" "secret" .Values.temporal.postgresql.existingSecret "key" "POSTGRES_USER") | nindent 12 }}
            {{- include "common.envSecret" (dict "name" "POSTGRES_PASSWORD" "secret" .Values.temporal.postgresql.existingSecret "key" "POSTGRES_PASSWORD") | nindent 12 }}
            {{- include "common.env" (dict "name" "PGDATA" "value" "/var/lib/postgresql/data/pgdata") | nindent 12 }}
          volumeMounts:
            {{- include "common.volumeMount" (dict "name" "data" "mountPath" "/var/lib/postgresql/data") | nindent 12 }}
          {{- with .Values.temporal.postgresql.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
  {{- if .Values.temporal.postgresql.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          {{- toYaml .Values.temporal.postgresql.persistence.accessModes | nindent 10 }}
        {{- with .Values.temporal.postgresql.persistence.storageClassName }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.temporal.postgresql.persistence.size }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  {{- include "common.metadata" (dict "name" (include "postiz.temporal.postgresql.fullname" .) "root" $) | nindent 2 }}
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    {{- include "common.selectorLabels" (dict "root" $ "component" "temporal-postgresql") | nindent 4 }}
  ports:
    - name: postgresql
      port: 5432
      targetPort: postgresql
      protocol: TCP
{{- end }}
