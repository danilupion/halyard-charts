apiVersion: apps/v1
kind: Deployment
metadata:
  {{- include "common.metadata" (dict "name" (include "common.fullname" .) "root" $) | nindent 2 }}
spec:
  replicas: {{ .Values.postiz.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "common.selectorLabels" (dict "root" $ "component" "postiz") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "common.selectorLabels" (dict "root" $ "component" "postiz") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.postiz.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postiz
          {{- with .Values.postiz.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- include "common.image" (dict "repository" (printf "%s/%s" .Values.postiz.image.registry .Values.postiz.image.repository) "tag" .Values.postiz.image.tag "pullPolicy" .Values.postiz.image.pullPolicy "root" $) | nindent 10 }}
          # Upstream nginx.conf runs workers as `www` (uid 100) while pm2/Node
          # runs as root. Uploads written by Node land as root:root, unreadable
          # to nginx, which serves /uploads/ to the worker — breaks media uploads
          # to X/IG/etc. Patch nginx to run workers as root so it can read
          # everything Node writes. Same shared volume, no perms drift.
          command:
            - sh
            - -c
            - 'sed -i "s/^user .*$/user root;/" /etc/nginx/nginx.conf && nginx && pnpm run pm2'
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          env:
            {{- include "common.env" (dict "name" "MAIN_URL" "value" .Values.postiz.urls.main) | nindent 12 }}
            {{- include "common.env" (dict "name" "FRONTEND_URL" "value" (include "postiz.urls.frontend" .)) | nindent 12 }}
            {{- include "common.env" (dict "name" "NEXT_PUBLIC_BACKEND_URL" "value" (include "postiz.urls.backend" .)) | nindent 12 }}
            {{- include "common.env" (dict "name" "BACKEND_INTERNAL_URL" "value" .Values.postiz.urls.internalBackend) | nindent 12 }}
            {{- include "common.envSecret" (dict "name" "DATABASE_URL" "secret" .Values.postiz.database.existingSecret "key" .Values.postiz.database.existingSecretKey) | nindent 12 }}
            {{- if .Values.postiz.redis.url }}
            {{- include "common.env" (dict "name" "REDIS_URL" "value" .Values.postiz.redis.url) | nindent 12 }}
            {{- else }}
            {{- include "common.envSecret" (dict "name" "REDIS_URL" "secret" .Values.postiz.redis.existingSecret "key" .Values.postiz.redis.existingSecretKey) | nindent 12 }}
            {{- end }}
            {{- include "common.envSecret" (dict "name" "JWT_SECRET" "secret" .Values.postiz.jwt.existingSecret "key" .Values.postiz.jwt.existingSecretKey) | nindent 12 }}
            {{- if .Values.temporal.enabled }}
            {{- include "common.env" (dict "name" "TEMPORAL_ADDRESS" "value" (printf "%s:%d" (include "postiz.temporal.server.fullname" .) (int .Values.temporal.server.service.port))) | nindent 12 }}
            {{- end }}
            {{- include "common.env" (dict "name" "IS_GENERAL" "value" .Values.postiz.isGeneral) | nindent 12 }}
            {{- include "common.env" (dict "name" "DISABLE_REGISTRATION" "value" .Values.postiz.disableRegistration) | nindent 12 }}
            {{- include "common.env" (dict "name" "STORAGE_PROVIDER" "value" .Values.postiz.storage.provider) | nindent 12 }}
            {{- include "common.env" (dict "name" "UPLOAD_DIRECTORY" "value" .Values.postiz.storage.uploadDirectory) | nindent 12 }}
            {{- include "common.env" (dict "name" "NEXT_PUBLIC_UPLOAD_DIRECTORY" "value" .Values.postiz.storage.publicUploadDirectory) | nindent 12 }}
            {{- with .Values.postiz.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.postiz.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if .Values.postiz.persistence.config.enabled }}
            {{- include "common.volumeMount" (dict "name" "config" "mountPath" "/config") | nindent 12 }}
            {{- end }}
            {{- if .Values.postiz.persistence.uploads.enabled }}
            {{- include "common.volumeMount" (dict "name" "uploads" "mountPath" .Values.postiz.storage.uploadDirectory) | nindent 12 }}
            {{- end }}
          {{- with .Values.postiz.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.postiz.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.postiz.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        {{- if .Values.postiz.persistence.config.enabled }}
        - name: config
          persistentVolumeClaim:
            claimName: {{ .Values.postiz.persistence.config.existingClaim | default (printf "%s-config" (include "common.fullname" .)) }}
        {{- end }}
        {{- if .Values.postiz.persistence.uploads.enabled }}
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ .Values.postiz.persistence.uploads.existingClaim | default (printf "%s-uploads" (include "common.fullname" .)) }}
        {{- end }}
      {{- with .Values.postiz.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.postiz.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.postiz.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
