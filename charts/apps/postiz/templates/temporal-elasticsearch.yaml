{{- if .Values.temporal.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  {{- include "common.metadata" (dict "name" (include "postiz.temporal.elasticsearch.fullname" .) "root" $) | nindent 2 }}
spec:
  serviceName: {{ include "postiz.temporal.elasticsearch.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "common.selectorLabels" (dict "root" $ "component" "temporal-elasticsearch") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "common.selectorLabels" (dict "root" $ "component" "temporal-elasticsearch") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.temporal.elasticsearch.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: elasticsearch
          {{- include "common.image" (dict "repository" (printf "%s/%s" .Values.temporal.elasticsearch.image.registry .Values.temporal.elasticsearch.image.repository) "tag" .Values.temporal.elasticsearch.image.tag "pullPolicy" .Values.temporal.elasticsearch.image.pullPolicy "root" $) | nindent 10 }}
          ports:
            - name: http
              containerPort: 9200
              protocol: TCP
          env:
            {{- include "common.env" (dict "name" "discovery.type" "value" "single-node") | nindent 12 }}
            {{- include "common.env" (dict "name" "xpack.security.enabled" "value" "false") | nindent 12 }}
            {{- include "common.env" (dict "name" "cluster.routing.allocation.disk.threshold_enabled" "value" "true") | nindent 12 }}
            {{- include "common.env" (dict "name" "cluster.routing.allocation.disk.watermark.low" "value" "512mb") | nindent 12 }}
            {{- include "common.env" (dict "name" "cluster.routing.allocation.disk.watermark.high" "value" "256mb") | nindent 12 }}
            {{- include "common.env" (dict "name" "cluster.routing.allocation.disk.watermark.flood_stage" "value" "128mb") | nindent 12 }}
            {{- include "common.env" (dict "name" "ES_JAVA_OPTS" "value" .Values.temporal.elasticsearch.javaOpts) | nindent 12 }}
          volumeMounts:
            {{- include "common.volumeMount" (dict "name" "data" "mountPath" "/usr/share/elasticsearch/data") | nindent 12 }}
          {{- with .Values.temporal.elasticsearch.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
  {{- if .Values.temporal.elasticsearch.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          {{- toYaml .Values.temporal.elasticsearch.persistence.accessModes | nindent 10 }}
        {{- with .Values.temporal.elasticsearch.persistence.storageClassName }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.temporal.elasticsearch.persistence.size }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  {{- include "common.metadata" (dict "name" (include "postiz.temporal.elasticsearch.fullname" .) "root" $) | nindent 2 }}
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    {{- include "common.selectorLabels" (dict "root" $ "component" "temporal-elasticsearch") | nindent 4 }}
  ports:
    - name: http
      port: 9200
      targetPort: http
      protocol: TCP
{{- end }}
