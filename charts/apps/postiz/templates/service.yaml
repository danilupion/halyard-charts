apiVersion: v1
kind: Service
metadata:
  {{- include "common.metadata" (dict "name" (include "common.fullname" .) "root" $) | nindent 2 }}
  {{- with .Values.postiz.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.postiz.service.type }}
  selector:
    {{- include "common.selectorLabels" (dict "root" $ "component" "postiz") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.postiz.service.port }}
      targetPort: http
      protocol: TCP
