apiVersion: apps/v1
kind: Deployment
metadata:
  {{- include "common.metadata" (dict "name" (include "common.fullname" .) "root" $) | nindent 2 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "common.selectorLabels" (dict "root" $ "component" "server") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "common.selectorLabels" (dict "root" $ "component" "server") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: linkwarden
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- include "common.image" (dict "repository" (printf "%s/%s" .Values.image.registry .Values.image.repository) "tag" .Values.image.tag "pullPolicy" .Values.image.pullPolicy "root" $) | nindent 10 }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            # Database
            {{- if .Values.database.existingSecret }}
            {{- include "common.envSecret" (dict "name" "DATABASE_URL" "secret" .Values.database.existingSecret "key" .Values.database.existingSecretKey) | nindent 12 }}
            {{- end }}
            # NextAuth
            {{- include "common.env" (dict "name" "NEXTAUTH_URL" "value" .Values.nextauth.url) | nindent 12 }}
            {{- if .Values.nextauth.existingSecret }}
            {{- include "common.envSecret" (dict "name" "NEXTAUTH_SECRET" "secret" .Values.nextauth.existingSecret "key" .Values.nextauth.existingSecretKey) | nindent 12 }}
            {{- end }}
            # Linkwarden config
            {{- include "common.env" (dict "name" "NEXT_PUBLIC_DISABLE_REGISTRATION" "value" (.Values.linkwarden.disableRegistration | toString)) | nindent 12 }}
            {{- include "common.env" (dict "name" "DISABLE_PRESERVATION" "value" (.Values.linkwarden.disablePreservation | toString)) | nindent 12 }}
            {{- include "common.env" (dict "name" "STORAGE_FOLDER" "value" .Values.linkwarden.storageFolder) | nindent 12 }}
            # Additional environment variables
            {{- with .Values.linkwarden.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.linkwarden.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            {{- include "common.volumeMount" (dict "name" "data" "mountPath" .Values.linkwarden.storageFolder) | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-data" (include "common.fullname" .)) }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
