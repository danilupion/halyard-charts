# Resource baseline assumes a single 1080p x264 veryfast rendition.
# Multi-rendition ladders (720p + 480p + ...) need more CPU — bump resources.limits.cpu.

# Common labels/annotations applied to all resources
commonLabels: {}
commonAnnotations: {}

# Override the name of the chart
nameOverride: ""

# Override the full name of the resources
fullnameOverride: ""

# Owncast container image
image:
  repository: owncast/owncast
  tag: 0.2.5@sha256:c7508304908238e7276b55c68566608fea53673dd7b79cec91ef7e35f7692ce4
  pullPolicy: IfNotPresent

# Image pull secrets for private registries
imagePullSecrets: []

# HTTP service (web UI + HLS playback)
service:
  type: ClusterIP
  port: 8080
  annotations: {}

# RTMP ingest service. Intended to stay internal — consumed by an in-cluster
# publisher (e.g. an ffmpeg Job pushing rtmp://<svc>:1935/live/<key>).
# Keep type=ClusterIP; do not expose externally.
rtmpService:
  type: ClusterIP
  port: 1935
  annotations: {}

# Ingress configuration for the HTTP service
ingress:
  enabled: false
  className: ""
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: owncast.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: owncast-tls
    #   hosts:
    #     - owncast.example.com

# Persistent storage for SQLite state, HLS segments, chat history, uploads
persistence:
  enabled: true
  storageClassName: ""
  accessModes:
    - ReadWriteOnce
  size: 20Gi
  existingClaim: ""

# Authentication configuration
# The chart does not create Secrets — provide one out of band (e.g. SealedSecret)
# containing the Owncast env vars you want injected (OWNCAST_ADMIN_PASSWORD,
# OWNCAST_STREAM_KEYS, ...). All keys in the referenced Secret are loaded via envFrom.
auth:
  existingSecret: ""

# Additional environment variables
extraEnv: []
  # - name: OWNCAST_NAME
  #   value: "My Stream"

# Extra envFrom sources (configmaps/secrets)
extraEnvFrom: []
  # - configMapRef:
  #     name: owncast-extra

# Resource limits and requests
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Liveness probe configuration
livenessProbe:
  httpGet:
    path: /api/status
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 5

# Readiness probe configuration
readinessProbe:
  httpGet:
    path: /api/status
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# Node selector for pod assignment
nodeSelector: {}

# Tolerations for pod assignment
tolerations: []

# Affinity for pod assignment
affinity: {}
