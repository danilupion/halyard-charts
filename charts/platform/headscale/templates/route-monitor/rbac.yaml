{{- if and .Values.routeMonitor.enabled .Values.subnetRouter.enabled -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  {{- include "common.metadata" (dict "name" (printf "%s-route-monitor" (include "common.fullname" .)) "root" $) | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  {{- include "common.metadata" (dict "name" (printf "%s-route-monitor" (include "common.fullname" .)) "root" $) | nindent 2 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames:
      - {{ include "common.fullname" . }}
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  {{- include "common.metadata" (dict "name" (printf "%s-route-monitor" (include "common.fullname" .)) "root" $) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "common.fullname" . }}-route-monitor
subjects:
  - kind: ServiceAccount
    name: {{ include "common.fullname" . }}-route-monitor
    namespace: {{ .Release.Namespace }}
{{- end }}
