{{- if .Values.subnetRouter.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  {{- include "common.metadata" (dict "name" (printf "%s-subnet-router" (include "common.fullname" .)) "root" $) | nindent 2 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "common.selectorLabels" (dict "root" $ "component" "subnet-router") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "common.selectorLabels" (dict "root" $ "component" "subnet-router") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "common.fullname" . }}-subnet-router
      {{- with .Values.subnetRouter.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: tailscale
          {{- include "common.image" (dict "repository" .Values.subnetRouter.image.repository "tag" .Values.subnetRouter.image.tag "pullPolicy" .Values.subnetRouter.image.pullPolicy "root" $) | nindent 10 }}
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  {{- if .Values.subnetRouter.existingSecret }}
                  name: {{ .Values.subnetRouter.existingSecret }}
                  key: {{ .Values.subnetRouter.existingSecretKey }}
                  {{- else }}
                  name: {{ include "common.fullname" . }}-subnet-router
                  key: auth-key
                  {{- end }}
            - name: TS_KUBE_SECRET
              value: {{ printf "%s-subnet-router-state" (include "common.fullname" .) | quote }}
            - name: TS_SOCKET
              value: /var/run/tailscale/tailscaled.sock
            - name: TS_USERSPACE
              value: "false"
            - name: TS_ROUTES
              value: {{ join "," .Values.subnetRouter.routes | quote }}
            {{- if .Values.subnetRouter.hostname }}
            - name: TS_HOSTNAME
              value: {{ .Values.subnetRouter.hostname | quote }}
            {{- end }}
            - name: TS_EXTRA_ARGS
              value: "--login-server={{ .Values.headscale.serverUrl }}{{- if .Values.subnetRouter.advertiseExitNode }} --advertise-exit-node{{- end }} --accept-routes=false"
          {{- if .Values.subnetRouter.livenessProbe.enabled }}
          # Self-heals sustained control-plane desync: if this node is deleted from
          # headscale's database while the pod keeps running (e.g. ephemeral node
          # cleanup during a headscale restart), tailscaled loops on 404 map polls
          # forever and never re-registers. The two health warnings whose text
          # mentions "coordination server" (not-in-map-poll, map-response-timeout)
          # only become visible after ~8 minutes of sustained desync, so routine
          # headscale restarts do not trip this probe. The container restart makes
          # containerboot re-run `tailscale up --authkey`, re-registering the node.
          # NOTE: containerboot's TS_ENABLE_HEALTH_CHECK /healthz cannot be used
          # here - it only updates on netmap events, which never arrive in this
          # failure mode, so it keeps reporting the stale healthy state.
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - '! tailscale status --json | grep -q "coordination server"'
            initialDelaySeconds: {{ .Values.subnetRouter.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.subnetRouter.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.subnetRouter.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.subnetRouter.livenessProbe.failureThreshold }}
          {{- end }}
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
          {{- with .Values.subnetRouter.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tun
              mountPath: /dev/net/tun
            - name: state
              mountPath: /var/lib/tailscale
            - name: run
              mountPath: /var/run/tailscale
      volumes:
        - name: tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
        - name: state
          emptyDir: {}
        - name: run
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
