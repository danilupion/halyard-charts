# Headscale configuration
headscale:
  # Public URL where Headscale will be accessible (required)
  # This is the URL clients will use to connect
  serverUrl: ""

  # IP prefixes for the tailnet
  ipPrefixes:
    v4: "100.64.0.0/10"
    v6: "fd7a:115c:a1e0::/48"

  # Base domain for MagicDNS (optional)
  # If set, devices get DNS names like device.baseDomain
  baseDomain: ""

  # DNS configuration
  dns:
    # Enable MagicDNS
    magicDns: true
    # Upstream nameservers
    nameservers:
      - 1.1.1.1
      - 8.8.8.8

  # DERP (relay) configuration
  derp:
    # Use external DERP servers (Tailscale's public servers)
    externalEnabled: true
    # URL to fetch DERP map
    url: "https://controlplane.tailscale.com/derpmap/default"
    # Run embedded DERP server (useful if clients can't reach external DERP)
    embeddedEnabled: false
    embeddedPort: 3478

  # Database configuration
  database:
    # Type: sqlite or postgres
    type: sqlite
    # SQLite settings (used when type=sqlite)
    sqlite:
      path: /var/lib/headscale/db.sqlite
    # PostgreSQL settings (used when type=postgres)
    postgres:
      host: ""
      port: 5432
      name: headscale
      user: headscale
      # Password from existing secret
      existingSecret: ""
      existingSecretKey: password

  # OIDC configuration (optional)
  oidc:
    enabled: false
    issuer: ""
    clientId: ""
    # Client secret from existing secret
    existingSecret: ""
    existingSecretKey: client-secret

  # Ephemeral node cleanup timeout
  ephemeralNodeTimeout: 2m

  # Log level: trace, debug, info, warn, error
  logLevel: info

  # ACL Policy configuration
  policy:
    # Enable ACL policy
    enabled: false
    # Policy content (HuJSON format)
    # See: https://headscale.net/stable/ref/acls/
    content: ""

# Image configuration
image:
  repository: headscale/headscale
  tag: "v0.29.2@sha256:d337f1be4a9155b330aa9077bf6c82d24ff0581b8e69390ebc6d7c623bb339ce"
  pullPolicy: IfNotPresent

# Resource limits
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Persistence for Headscale data
persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi

# Service configuration
service:
  type: ClusterIP
  ports:
    http: 8080
    grpc: 50443
    metrics: 9090

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
  host: ""
  tls: []

# Route monitor - auto-fixes broken route primary assignment
# Detects ghost nodes and missing primaries, restarts headscale to recover
# Watchdog for headscale's broken route-primary assignment (issues #2896/#3020):
# routes approved but no primary serving -> restarts headscale to recalculate.
# It does NOT detect a missing/deleted subnet-router node (the route rows vanish
# entirely and the check passes) - that failure mode is covered by
# subnetRouter.livenessProbe instead. The two are complementary: the probe
# re-registers the router, and a re-registration against a running headscale is
# exactly what can trigger the broken-primary state this monitor fixes.
#
# RETIREMENT PLAN: the upstream issues are closed, but recurrences were reported
# on v0.28 with autoApprovers + tagged pre-auth keys (our exact setup). Retire
# this monitor when BOTH hold:
#   1. Its logs have not shown "Found N route(s) without primary assignment" for
#      ~3 months of normal operation, including several headscale restarts and
#      at least one headscale upgrade.
#   2. No new recurrence reports on headscale issues #2896/#3020 (or successors)
#      for the release line in use.
# See gitops docs/sop-headscale-vpn-recovery.md for the full context.
routeMonitor:
  enabled: false
  schedule: "*/2 * * * *"
  image:
    repository: bitnami/kubectl
    tag: latest@sha256:95de17e6eb92da83a58c90a9df0c4cede634f898d2e6b92ea04f4a6ee6ace08d
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# Subnet router configuration
subnetRouter:
  enabled: false

  # Stable hostname for the subnet router (recommended)
  # Use this as the exit-node target from other nodes
  hostname: ""

  # Routes to advertise (e.g., home network)
  routes: []
  # - 192.168.3.0/24

  # Tags to advertise (for ACL autoApprovers)
  # See: https://headscale.net/stable/ref/acls/#autoapprovers
  tags: []
  # - tag:subnet-router

  # Static /etc/hosts entries for the subnet-router pod. Use when the pod shares a
  # cluster with the control server and should reach it via an internal IP instead
  # of hairpinning out to the public serverUrl (e.g. a home cluster whose public
  # FQDN is a DynDNS CNAME to the WAN, where NAT loopback is unreliable).
  hostAliases: []
  # - ip: 192.168.3.1
  #   hostnames:
  #     - headscale.example.com

  # Advertise as exit node (routes all internet traffic through this node)
  advertiseExitNode: false

  # Pre-auth key for the subnet router
  # Create with: headscale preauthkeys create --user admin --reusable --expiration 365d
  authKey: ""
  # Or use existing secret
  existingSecret: ""
  existingSecretKey: auth-key

  # Restart tailscaled when it loses control-plane sync for a sustained period
  # (the underlying health warnings surface after ~8 min of desync). Catches the
  # "node deleted from headscale while pod keeps running" failure mode, which
  # tailscaled never recovers from on its own (endless 404 map polls). The
  # restart re-runs `tailscale up --authkey`, re-registering the node.
  # Worst-case recovery: ~8 min (warning visible) + periodSeconds * failureThreshold.
  livenessProbe:
    enabled: true
    initialDelaySeconds: 60
    periodSeconds: 60
    timeoutSeconds: 10
    failureThreshold: 3

  # Tailscale client image
  image:
    repository: tailscale/tailscale
    tag: stable@sha256:f15d5d3f4a68773a853180b72496f70ba614b64de0878c43fe3da39fe0afba47
    pullPolicy: IfNotPresent

  # Resource limits for subnet router
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Common labels to add to all resources
commonLabels: {}

# Common annotations to add to all resources
commonAnnotations: {}

# Headplane UI configuration
ui:
  enabled: false

  image:
    repository: ghcr.io/tale/headplane
    tag: "0.7.0@sha256:7bd6523a14567a43eb4ffa1e95e3d95456b8539c9d081757df3f228b9e836fb5"
    pullPolicy: IfNotPresent

  # Cookie secret for session encryption (32 characters)
  # Generate with: openssl rand -hex 16
  cookieSecret: ""
  # Or use existing secret
  existingCookieSecret: ""
  existingCookieSecretKey: cookie-secret

  # Cookie max age in seconds (default: 30 days)
  # Session expires after this time, requiring API key re-entry
  cookieMaxAge: 2592000

  # Persistence for Headplane data (API key storage, etc.)
  persistence:
    enabled: false
    storageClass: ""
    size: 100Mi

  # Ingress configuration for UI (separate domain)
  ingress:
    enabled: false
    className: ""
    annotations: {}
    host: ""
    tls: []

  # Resource limits (Node.js needs more memory)
  resources:
    requests:
      cpu: 10m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Container security context
  # Note: readOnlyRootFilesystem must be false - Headplane needs to write temp files
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
