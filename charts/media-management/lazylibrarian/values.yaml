# Default values for lazylibrarian
# Book, audiobook and magazine collection manager for Usenet and BitTorrent users

# Override names
nameOverride: ""
fullnameOverride: ""

# Image configuration
image:
  repository: lscr.io/linuxserver/lazylibrarian
  tag: "6324496a-ls297@sha256:668487a62bed03b35bd9c82cb89208081e72c04a6416675b03228a9ebc056b3d"
  pullPolicy: IfNotPresent

# LinuxServer container settings
linuxserver:
  puid: 1000
  pgid: 1000
  tz: "UTC"

# LazyLibrarian-specific configuration
lazylibrarian:
  port: 5299

# Service configuration
service:
  type: ClusterIP
  port: 5299

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

# Config persistence
persistence:
  config:
    enabled: true
    existingClaim: ""
    mountPath: /config

# Storage mounts - flexible list of volumes
# For hardlinks to work, downloads and books must be on the same mount point
#
# Example:
#   storage:
#     - name: books
#       mountPath: /storage
#       existingClaim: disk1-storage
#       subPath: books
storage: []

# Resource limits
resources: {}

# Deployment strategy - Recreate for single-replica stateful apps
strategy:
  type: Recreate

# Probes
livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 5
  tcpSocket:
    port: http

readinessProbe:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 10
  failureThreshold: 3
  tcpSocket:
    port: http
