name: Helm chart CI
on:
  pull_request:
    paths:
      - 'charts/**'
  push:
    branches: [ main ]
    paths:
      - 'charts/**'
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5

      - name: Lint charts
        run: |
          for c in charts/*/*; do
            [ -f "$c/Chart.yaml" ] && helm lint "$c" || true
          done

      - name: Template check (no cluster required)
        run: |
          for c in charts/*/*; do
            [ -f "$c/Chart.yaml" ] && helm template test "$c" || true
          done
